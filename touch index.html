<!DOCTYPE html>
<html>

<head>
    <title>Solution K</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        textarea {
            width: 100%;
            height: 150px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            margin-top: 20px;
            background: #3b82f6;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 30px;
            background: #1e293b;
            padding: 20px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <h1>🚀 Solution K AI Study Assistant</h1>

    <p>Paste syllabus or assignment:</p>

    <textarea id="input"></textarea>

    <br>

    <button onclick="generate()">Generate Study Guide</button>

    <div id="result"></div>

    <script>

        async function generate() {

            const syllabus = document.getElementById("input").value;

            const response = await fetch("http://localhost:3000/study", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ syllabus })
            });

            const data = await response.json();

            document.getElementById("result").innerText = data.result;

        }

    </script>

</body>

</html>
